name: CI/CD - Analyse PR (SonarCloud)

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  # ─────────────────────────────────────────────
  # BACKEND : Build Maven + Analyse SonarCloud
  # ─────────────────────────────────────────────
  backend-analysis:
    name: Backend (Java/Spring Boot)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour SonarCloud (historique complet)

      - name: Configuration Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven + SonarCloud
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.sonar/cache
          key: ${{ runner.os }}-maven-sonar-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-sonar-

      - name: Build + Tests + Analyse SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}       # Décoration automatique des PRs
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}         # Créé sur sonarcloud.io
          SPRING_PROFILES_ACTIVE: test
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.exclusions="**/entity/**,**/dto/**,**/config/**,**/*Config.java"

  # ─────────────────────────────────────────────
  # FRONTEND : Build React + Lint + Analyse SonarCloud
  # ─────────────────────────────────────────────
  frontend-analysis:
    name: Frontend (React)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ebooks-frontend

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ebooks-frontend/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Vérification ESLint
        run: npm run build -- --max-warnings 0
        continue-on-error: true   # Ne bloque pas le pipeline pour les warnings ESLint

      - name: Analyse SonarCloud (Frontend)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ebooks-frontend

  # ─────────────────────────────────────────────
  # QUALITY GATE : Vérification du seuil qualité
  # ─────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [ backend-analysis, frontend-analysis ]

    steps:
      - name: Attente du Quality Gate SonarCloud
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

