# ─────────────────────────────────────────────
# Configuration SonarCloud - Frontend React
# ─────────────────────────────────────────────

# Clé projet : doit correspondre au projet créé sur sonarcloud.io
sonar.projectKey=ebooks-frontend
sonar.projectName=Ebooks Frontend (React)
sonar.projectVersion=0.1.0

# Sources
sonar.sources=src
sonar.exclusions=\
  node_modules/**,\
  build/**,\
  src/**/*.test.js,\
  src/**/*.spec.js,\
  src/setupTests.js,\
  src/reportWebVitals.js,\
  public/**

# Tests
sonar.tests=src
sonar.test.inclusions=src/**/*.test.js,src/**/*.spec.js

# Couverture (si tu lances jest avec --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encodage
sonar.sourceEncoding=UTF-8

